name: I-D Build

on:
  push:
  delete:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6

      - name: Install xml2rfc
        run: pip install xml2rfc

      - name: Build drafts
        run: |
          for xml in draft-*.xml; do
            xml2rfc "$xml" --text
            xml2rfc "$xml" --html
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          path: |
            draft-*.html
            draft-*.txt
            draft-*.xml
            index.html

      - name: Prepare output
        run: |
          mkdir -p public
          SAFE_BRANCH="${GITHUB_REF_NAME//\//-}"

          if [ "$SAFE_BRANCH" = "main" ]; then
            cp draft-*.html draft-*.txt draft-*.xml index.html public/
          else
            for f in draft-*.html draft-*.txt; do
              base="${f%.*}"
              ext="${f##*.}"
              cp "$f" "public/${SAFE_BRANCH}-preview-${base}.${ext}"
            done
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true

  cleanup:
    runs-on: ubuntu-latest
    if: github.event_name == 'delete' && github.event.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove preview files for deleted branch
        run: |
          SAFE_BRANCH="${{ github.event.ref }}"
          SAFE_BRANCH="${SAFE_BRANCH//\//-}"
          rm -f "${SAFE_BRANCH}-preview-"*

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --staged --quiet; then
            git commit -m "Remove preview files for deleted branch"
            git push
          fi
